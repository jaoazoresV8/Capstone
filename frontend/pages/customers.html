<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers - D&amp;M Sales</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body data-page="customers" class="page-loading">
    <div id="app-nav"></div>
    <script src="../js/nav-inline.js"></script>

    <main class="app-main container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="h4 mb-1">Customers</h1>
          <p class="text-muted small mb-0">
            Keep track of your regular buyers and their balances.
          </p>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <!-- Search + Filter (same design as products, sales) -->
          <div class="app-filter-bar">
            <div class="search-wrap input-group input-group-sm">
              <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
              <input type="text" class="form-control" id="customer-search" placeholder="Search name, contact, or address…" autocomplete="off" />
            </div>
            <select class="form-select form-select-sm" id="customer-filter-balance">
              <option value="">All customers</option>
              <option value="with_balance">With balance</option>
              <option value="no_balance">No balance</option>
            </select>
            <button class="btn btn-primary btn-sm" type="button" id="btn-customer-search">
              <i class="bi bi-funnel"></i> Apply
            </button>
          </div>

          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Contact</th>
                  <th>Address</th>
                  <th>Products bought</th>
                  <th>Total Balance</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="customers-tbody">
                <tr>
                  <td colspan="7" class="text-muted small">
                    Customer list will be displayed here.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-navigation.js"></script>
    <script src="/js/modal-draggable.js"></script>
    <script src="../js/dashboard.js" type="module"></script>
    <script src="../js/customers.js" type="module"></script>
  </body>
</html>
